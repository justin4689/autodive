

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: inertia_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - inertia
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: inertia_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - inertia

  vite:
    image: node:22-alpine
    container_name: inertia_vite
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vite_node_modules:/var/www/node_modules
    ports:
      - "5173:5173"
    command: sh -c "printf '#!/bin/sh\nexit 0\n' > /usr/local/bin/php && chmod +x /usr/local/bin/php && npm install --no-package-lock && npm run dev -- --host 0.0.0.0"
    networks:
      - inertia
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: inertia_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - inertia

  redis:
    image: redis:7-alpine
    container_name: inertia_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - inertia

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: inertia_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work --tries=3 --timeout=90
    depends_on:
      - app
      - redis
    networks:
      - inertia

volumes:
  mysql_data:
  redis_data:
  vite_node_modules:

networks:
  inertia:
    driver: bridge